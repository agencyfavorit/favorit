<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Сайт находится на техническом обслуживании">
    <meta name="theme-color" content="#6366f1">
    <title>Техническое обслуживание</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>⚡</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Commissioner:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700;800&display=swap&subset=cyrillic,cyrillic-ext,latin,latin-ext" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Commissioner', 'DM Sans', sans-serif;
            background: #0a0a1a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #6366f1, transparent);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #8b5cf6, transparent);
            bottom: -80px;
            left: -80px;
            animation-delay: -3s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #a78bfa, transparent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .orb-3 {
            animation-name: float-center;
        }

        @keyframes float-center {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) translateY(-30px) scale(1.05); }
        }

        .maintenance {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 650px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 3rem;
        }

        .logo-icon {
            font-size: 2.5rem;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gear-icon {
            font-size: 4rem;
            display: inline-block;
            animation: spin 6s linear infinite;
            margin-bottom: 1.5rem;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 1.2rem;
        }

        h1 .gradient-text {
            background: linear-gradient(135deg, #6366f1, #a78bfa, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .description {
            font-size: 1.1rem;
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #6366f1, #a78bfa);
            border-radius: 2px;
            margin: 0 auto 2.5rem;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .contact-info a {
            color: #a78bfa;
            text-decoration: none;
            transition: color 0.3s;
        }

        .contact-info a:hover {
            color: #c4b5fd;
        }

        .lang-switch {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 10;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #a78bfa;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            font-family: 'Commissioner', sans-serif;
        }

        .lang-switch:hover {
            background: rgba(99, 102, 241, 0.25);
            color: #c4b5fd;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6366f1;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.3s; }
        .dot:nth-child(3) { animation-delay: 0.6s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <a href="index-en.html" class="lang-switch">EN</a>

    <div class="bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <div class="maintenance">
        <div class="gear-icon">⚙️</div>

        <h1>Сайт находится на <span class="gradient-text">техническом обслуживании</span></h1>

        <p class="description">
            Мы улучшаем наш сайт, чтобы сделать его ещё лучше для вас.
            Совсем скоро мы вернёмся в обновлённом виде!
        </p>

        <div class="divider"></div>

        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="contact-info">
            <span>Свяжитесь с нами: <a href="mailto:info@favorit.dev">info@favorit.dev</a></span>
            <span>Telegram: <a href="https://t.me/favoritagency">@favoritagency</a></span>
        </div>
    </div>
</body>
</html>
